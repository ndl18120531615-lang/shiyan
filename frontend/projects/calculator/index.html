<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科学计算器</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="ambient"></div>
    <main class="page">
        <header class="hero">
            <a class="back-link" href="../../index.html"><- 返回项目集合</a>
            <p class="eyebrow">项目一</p>
            <h1>科学计算器</h1>
            <p class="subtitle">支持基础运算、科学函数、历史记录、内存功能与键盘快捷键。</p>
        </header>

        <section class="workspace">
            <div class="card calculator">
                <div class="display-card">
                    <p class="display-label">表达式</p>
                    <div id="expression" class="expression">0</div>
                    <p class="display-label">结果</p>
                    <div id="result" class="result">0</div>
                </div>

                <div class="control-row">
                    <div class="memory-group">
                        <button data-action="MC">存清</button>
                        <button data-action="MR">取存</button>
                        <button data-action="M+">存加</button>
                        <button data-action="M-">存减</button>
                    </div>
                    <div class="action-group">
                        <button id="sciToggle" data-action="SCI" class="accent">科学开</button>
                        <button data-action="Ans" class="accent">上次值</button>
                    </div>
                </div>

                <div id="scientificGrid" class="scientific-grid">
                    <button data-action="sin">sin</button>
                    <button data-action="cos">cos</button>
                    <button data-action="tan">tan</button>
                    <button data-action="log">log</button>
                    <button data-action="sqrt">sqrt</button>
                    <button data-action="^">^</button>
                </div>

                <div class="basic-grid">
                    <button data-action="C" class="utility">清空</button>
                    <button data-action="DEL" class="utility">退格</button>
                    <button data-action="(" class="utility">(</button>
                    <button data-action=")" class="utility">)</button>

                    <button data-action="7">7</button>
                    <button data-action="8">8</button>
                    <button data-action="9">9</button>
                    <button data-action="/" class="operator">/</button>

                    <button data-action="4">4</button>
                    <button data-action="5">5</button>
                    <button data-action="6">6</button>
                    <button data-action="*" class="operator">*</button>

                    <button data-action="1">1</button>
                    <button data-action="2">2</button>
                    <button data-action="3">3</button>
                    <button data-action="-" class="operator">-</button>

                    <button data-action="+/-" class="utility">+/-</button>
                    <button data-action="0">0</button>
                    <button data-action="." class="utility">.</button>
                    <button data-action="+" class="operator">+</button>

                    <button data-action="%" class="utility">%</button>
                    <div class="spacer"></div>
                    <button data-action="=" class="equals">=</button>
                    <div class="spacer"></div>
                </div>
            </div>

            <aside class="card history-panel">
                <div class="history-header">
                    <h2>历史记录</h2>
                    <button id="clearHistory" class="clear-history">清空</button>
                </div>
                <p class="history-hint">单击填入结果，双击填入表达式。</p>
                <ul id="historyList" class="history-list"></ul>
            </aside>
        </section>
    </main>

    <script src="./app.js"></script>
</body>
</html>
