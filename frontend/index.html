<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小项目集合</title>
    <link rel="stylesheet" href="./portal.css">
</head>
<body>
    <div class="bg-layer"></div>
    <main class="portal">
        <header class="portal-hero">
            <p class="hero-tag">Project Hub</p>
            <h1>我的小项目集合</h1>
            <p class="hero-desc">统一入口，集中管理不同前端小项目。先从计算器和简易记事本开始，后续可继续扩展。</p>
        </header>

        <section class="project-grid">
            <a class="project-card" href="./projects/calculator/index.html">
                <div class="card-top">
                    <span class="badge badge-blue">工具类</span>
                    <h2>科学计算器</h2>
                </div>
                <p>支持基础运算、科学函数、历史记录、内存操作与键盘快捷键。</p>
                <span class="card-link">进入项目 -></span>
            </a>

            <a class="project-card" href="./projects/notepad/index.html">
                <div class="card-top">
                    <span class="badge badge-orange">效率类</span>
                    <h2>简易记事本</h2>
                </div>
                <p>支持快速新增、编辑、删除与本地持久化，适合日常随手记录。</p>
                <span class="card-link">进入项目 -></span>
            </a>
        </section>
    </main>
</body>
</html>
